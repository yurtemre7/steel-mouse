name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "innosetup/setup.iss"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --noconsole --add-data images:images mouse.py

      - name: Install Inno Setup
        run: |
          choco install innosetup -y
        shell: powershell

      - name: Compile Inno Setup script
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' 'innosetup\setup.iss'
        shell: powershell

      - name: Read AppVersion from Inno Setup script
        id: read_version
        run: |
          $ver = (Select-String -Path 'innosetup\setup.iss' -Pattern '^\s*AppVersion\s*=\s*(\S+)' | ForEach-Object { $_.Matches[0].Groups[1].Value })
          if (-not $ver) { Write-Error "AppVersion not found in innosetup\setup.iss"; exit 1 }
          Write-Host "Found AppVersion: $ver"
          Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION=$ver"
        shell: powershell

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.APP_VERSION }}
          body: Generated Release for SteelMouse v${{ env.APP_VERSION }} by Github Actions.
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            D:\a\steel-mouse\steel-mouse\innosetup\SteelMouse_Setup.exe